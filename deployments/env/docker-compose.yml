version: '3.8'

services:
  postgresql:
    image: registry.yygu.cn/library/postgres:18.3
    container_name: singer-postgresql
    environment:
      POSTGRES_DB: singer_db
      POSTGRES_USER: singer_user
      POSTGRES_PASSWORD: singer_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U singer_user -d singer_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: registry.yygu.cn/library/rabbitmq:3.13.7
    container_name: singer-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: singer_user
      RABBITMQ_DEFAULT_PASS: singer_password
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: registry.yygu.cn/library/redis:8.2
    container_name: singer-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  singer:
    build:
      context: ../..
      dockerfile: deployments/build/Dockerfile.singer
    container_name: singer-app
    ports:
      - "8080:8080"
    depends_on:
      postgresql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://singer_user:singer_password@postgresql:5432/singer_db
      - RABBITMQ_URL=amqp://singer_user:singer_password@rabbitmq:5672
      - REDIS_URL=redis://redis:6379
      - GIN_MODE=release
    volumes:
      - ./config.yaml:/app/config.yaml
    restart: unless-stopped

volumes:
  postgres_data:
  rabbitmq_data:
  redis_data: