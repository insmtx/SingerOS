version: '3.8'

services:
  postgresql:
    image: registry.yygu.cn/library/postgres:17.9
    container_name: singer-postgresql
    environment:
      POSTGRES_DB: singer_db
      POSTGRES_USER: singer_user
      POSTGRES_PASSWORD: singer_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U singer_user -d singer_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: registry.yygu.cn/library/nats:2.12.7
    container_name: singer-nats
    command: ["--jetstream"]
    environment: []
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD-SHELL", "nats server check"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: registry.yygu.cn/library/redis:8.2
    container_name: singer-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  singer:
    build:
      context: ../..
      dockerfile: deployments/build/Dockerfile.singer
    container_name: singer-app
    ports:
      - "8080:8080"
    depends_on:
      postgresql:
        condition: service_healthy
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://singer_user:singer_password@postgresql:5432/singer_db
      - NATS_URL=nats://nats:4222
      - REDIS_URL=redis://redis:6379
      - GIN_MODE=release
    volumes:
      - ./config.yaml:/app/config.yaml
    command: ["./singer", "--config", "/app/config.yaml"]
    restart: unless-stopped

volumes:
  postgres_data:
  nats_data:
  redis_data: